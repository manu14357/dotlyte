name: CI - Rust

on:
  push:
    branches: [main]
    paths:
      - 'langs/rust/**'
      - 'spec/**'
  pull_request:
    paths:
      - 'langs/rust/**'
      - 'spec/**'

defaults:
  run:
    working-directory: langs/rust

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, beta, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy, rustfmt
      - name: Format check
        run: cargo fmt --check
      - name: Clippy
        run: cargo clippy -- -D warnings
      - name: Test
        run: cargo test
      - name: Doc test
        run: cargo doc --no-deps
