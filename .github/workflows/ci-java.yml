name: CI - Java

on:
  push:
    branches: [main]
    paths:
      - 'langs/java/**'
      - 'spec/**'
  pull_request:
    paths:
      - 'langs/java/**'
      - 'spec/**'

defaults:
  run:
    working-directory: langs/java

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        java-version: ['11', '17', '21']
    steps:
      - uses: actions/checkout@v4
      - name: Make Gradle wrapper executable
        run: chmod +x gradlew
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ matrix.java-version }}
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
      - name: Build
        run: ./gradlew build
      - name: Test
        run: ./gradlew test
