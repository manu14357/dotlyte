name: Bug Report
description: Report a bug in a DOTLYTE language implementation
labels: ["bug", "triage"]
body:
  - type: dropdown
    id: language
    attributes:
      label: Language Implementation
      description: Which language is affected?
      options:
        - Python
        - JavaScript/TypeScript
        - Go
        - Rust
        - Java
        - Ruby
        - PHP
        - .NET/C#
        - Spec / Cross-language
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Package Version
      description: "What version of the package are you using? (e.g., 0.1.0)"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: runtime-version
    attributes:
      label: Runtime Version
      description: "Language runtime version (e.g., Python 3.12, Node 20, Go 1.22)"
      placeholder: "Python 3.12"

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **What happened:**
        ...

        **What I expected:**
        ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Minimal Reproduction
      description: Provide the smallest possible code example that reproduces the bug.
      render: shell
    validations:
      required: true

  - type: textarea
    id: config-files
    attributes:
      label: Config Files
      description: "Paste your .env, config.yaml, or other config files (redact secrets!)"
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux
        - Windows
        - Other
