name: Feature Request
description: Propose a new feature or enhancement
labels: ["enhancement"]
body:
  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: What area does this feature affect?
      options:
        - Spec (universal behavior change)
        - Python
        - JavaScript/TypeScript
        - Go
        - Rust
        - Java
        - Ruby
        - PHP
        - .NET/C#
        - CLI tool
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who benefits?
      placeholder: "As a developer, I want to ... so that ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this feature work? Include API examples if applicable.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered other approaches? Why is your proposal better?

  - type: checkboxes
    id: spec-change
    attributes:
      label: Spec Impact
      options:
        - label: "This requires a change to `spec/` (affects all languages)"
        - label: "This is language-specific (does not affect other implementations)"
